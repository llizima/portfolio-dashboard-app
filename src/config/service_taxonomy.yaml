        - vendor matching
        - startup matching
        - innovation pipeline
        - accelerator
        - incubator
        - consortium
      weak_signals:
        - engagement
        - outreach
        - innovation
        - network
        - partnership
      psc_hints: []
      naics_hints: []
      ambiguity_notes: >
        Use this category only when the contract explicitly points to partner,
        vendor, startup, ecosystem, accelerator, scouting, matching, or network
        access. Do not use broad PSC/NAICS evidence alone for this category.
        Do not use it for generic professional services, logistics support,
        technical assistance, R&D, or event execution unless ecosystem access is
        explicit in the text.

    - name: integrated_service_delivery
      definition: >
        Contracts that explicitly bundle multiple distinct service types into one
        combined delivery model and cannot reasonably be assigned to a single
        dominant category.
      examples:
        - end-to-end innovation support spanning engineering, prototyping,
          and program management
        - bundled delivery combining technical development and execution support
        - full lifecycle support with multiple distinct service modes
      keywords:
        - end to end delivery
        - integrated services
        - integrated support
        - full lifecycle support
        - combined services
        - bundled services
        - turnkey support
        - multi disciplinary support
        - multidisciplinary support
        - cradle to grave support
      strong_signals:
        - end to end delivery
        - integrated services
        - full lifecycle support
        - combined services
        - bundled services
        - turnkey support
        - cradle to grave support
      weak_signals:
        - integrated
        - full lifecycle
        - end to end
        - support
      psc_hints:
        - R499
      naics_hints:
        - 541715
      ambiguity_notes: >
        Use this category sparingly and only when multiple distinct categories are
        clearly intended as a bundled model and no single category is dominant.
        Do not use it as a generic fallback for ambiguity between two categories.

    - name: technical_advisory_services
      definition: >
        Advisory, governance, and development-oriented services focused on policy,
        institutional capacity, public sector effectiveness, implementation guidance,
        and stakeholder engagement rather than engineering design, fabrication, or
        prototype build work. Excludes general consulting, administrative support,
        logistics support, and ordinary program management support.
      keywords:
        - technical assistance
        - governance
        - capacity building
        - institutional strengthening
        - policy support
        - stakeholder engagement
        - implementation support
        - development activity
        - public sector
        - civil society
        - service delivery improvement
