        - civil society
        - service delivery improvement
      psc_hints: []
      naics_hints: []
      ambiguity_notes: >
        Use for governance, policy, institutional strengthening, stakeholder engagement,
        public-sector improvement, and capacity-building work. Do not use for engineering
        design/build/test work, prototyping, logistics support, administrative support,
        executive support, or generic program management support.

